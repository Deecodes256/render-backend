<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="/public/public-css/journal.css">
</head>

<body>

    <div class="forms">
        <form class="form-class" onsubmit="loginUser(event)">
            <input type="text" id="loginUsername" placeholder="Username" class="input">
            <input type="password" id="loginPassword" placeholder="Password" class="input">
            <button class="signup-buttons" type="submit">Login</button>
            <p id="loginResponse"></p>
        </form>

        <a href="/index.html">Don’t have an account? Sign up</a>
    </div>

    <script src="/public/public-js/forex.js"></script>
</body>

</html>
